name: Build PDFs
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Bibliography"]
    types: [completed]

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  Build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
      
      - name: Github Action for LaTeX
        uses: xu-cheng/latex-action@v3
        with: 
          compiler: latexmk
          texlive_version: 2023
          args: -pdf -auxdir=out/logs/ -outdir=../out/pdf/
          work_in_root_file_dir: true
          latexmk_use_xelatex: true
          root_file: |
            tex/milet-bibliographie-by-author-pdf.tex
            tex/milet-bibliographie-by-year-pdf.tex
            tex/milet-bibliographie-by-tag-pdf.tex
            tex/milet-bibliographie-summary.tex

      - name: Upload logs
        uses: actions/upload-artifact@v7
        with:
          name: tex-logs
          path: tex/logs/*.log

      - name: Upload PDFs
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: out/pdf/

          