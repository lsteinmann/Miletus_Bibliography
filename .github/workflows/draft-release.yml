name: Draft Release
on:  
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Workflow run ID containing the artifacts"
        required: true
        type: string
  workflow_run:
    workflows: ["Build Bibliography"]
    types:
      - completed

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  BUILD_RUN_ID: ${{ github.event.workflow_run.id || inputs.build_run_id }}

jobs:
  Release-Draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
      
      - name: Download Logs
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ env.BUILD_RUN_ID }}
          name: logs
          path: out/logs

      - name: Download Data
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ env.BUILD_RUN_ID }}
          name: data
          path: out/data

      - name: Download Tex Files
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ env.BUILD_RUN_ID }}
          name: tex
          path: out/tex

      - name: Check for files
        run: ls -R out/