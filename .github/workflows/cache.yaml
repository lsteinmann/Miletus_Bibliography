name: Refresh and Cache Files

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Refresh all bibliography files on this run"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 8 1 * *"

  push:
    branches:
      - main

jobs:
  get-bibliography:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Print run ID
        run: echo "Workflow-Run ID - ${{ github.run_id }}"

      - name: Determine mode
        id: mode
        shell: bash
        run: |
          REFRESH=false

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run: refreshing all bibliography files"
            REFRESH=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.refresh }}" = "true" ]; then
            echo "Manual dispatch with refresh enabled"
            REFRESH=true
          else
            echo "Cache-only mode"
          fi

          echo "refresh=$REFRESH" >> "$GITHUB_OUTPUT"

      - name: Restore cache
        id: cache
        if: steps.mode.outputs.refresh != 'true'
        uses: actions/cache/restore@v6
        with:
          path: out/
          key: bibliography-${{ github.ref_name }}

      - name: Setup Python
        if: steps.mode.outputs.refresh == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3' 
          cache: 'pip' # caching pip dependencies

      - name: Install python dependencies
        if: steps.mode.outputs.refresh == 'true'
        run: |
          pip install -r requirements.txt

      - name: Refresh bibliography files
        if: steps.mode.outputs.refresh == 'true'
        run: python main.py
      
      - name: Refresh the HTML-table
        if: steps.mode.outputs.refresh == 'true'
        run: python bibliography_convert.py

      - name: Save cache of updated files
        if: steps.mode.outputs.refresh == 'true'
        uses: actions/cache/save@v6
        with:
          path: out/
          key: bibliography-${{ github.ref_name }}

      - name: Show cached/refreshed files
        shell: bash
        run: |
          echo "Contents of out/:"
          ls -R out/

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with: 
          name: logs
          path: out/logs/
          retention-days: 31
          overwrite: true
      
      - name: Upload Data
        uses: actions/upload-artifact@v4
        with: 
          name: data
          path: out/data/
          retention-days: 31
          overwrite: true

      - name: Upload TeX files
        uses: actions/upload-artifact@v4
        with: 
          name: tex
          path: out/tex/
          retention-days: 31
          overwrite: true


  use-files:
    runs-on: ubuntu-latest
    needs: get-bibliography

    steps:
      - uses: actions/checkout@v6

      - name: Download Data
        uses: actions/download-artifact@v4
        with:
          name: data
          path: out/data

      - name: Show files
        run: |
          ls -R out/