name: Generate and Cache Files

on:
  workflow_dispatch:
    inputs:
      generate:
        description: "Generate files instead of only restoring cache"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 8 1 * *"

  push:
    branches:
      - main

jobs:
  generate-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine generation mode
        id: mode
        shell: bash
        run: |
          GENERATE=false

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run: generation enabled"
            GENERATE=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.generate }}" = "true" ]; then
            echo "Manual dispatch with generate enabled"
            GENERATE=true
          else
            echo "Cache-only mode"
          fi

          echo "generate=$GENERATE" >> "$GITHUB_OUTPUT"

      - name: Restore cache
        id: cache
        if: steps.mode.outputs.generate != 'true'
        uses: actions/cache@v4
        with:
          path: generated/
          key: generated-files-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            generated-files-${{ runner.os }}-

      - name: Generate files
        if: steps.mode.outputs.generate == 'true'
        shell: bash
        run: |
          echo "Generating files..."

          rm -rf generated

          mkdir -p generated/subdir1
          mkdir -p generated/subdir2/nested
          mkdir -p generated/subdir3

          echo "Generated file 1" > generated/file1.txt
          echo "Generated file 2" > generated/subdir1/file2.txt
          echo "Generated file 3" > generated/subdir2/nested/file3.txt
          echo "Generated file 4" > generated/subdir3/file4.txt

      - name: Cache generated files
        if: steps.mode.outputs.generate == 'true'
        uses: actions/cache@v4
        with:
          path: generated/
          key: generated-files-${{ runner.os }}-${{ github.ref_name }}

      - name: Show cached/generated files
        shell: bash
        run: |
          echo "Contents of generated/:"
          ls -R generated/

  use-files:
    runs-on: ubuntu-latest
    needs: generate-files

    steps:
      - uses: actions/checkout@v4

      - name: Restore generated files cache
        uses: actions/cache@v4
        with:
          path: generated/
          key: generated-files-${{ runner.os }}-${{ github.ref_name }}

      - name: Show files
        run: |
          ls -R generated/