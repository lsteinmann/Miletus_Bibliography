name: Run Python Scripts
on:
  push:
    branches:
      - new-workflows
  workflow_dispatch:
  schedule:
    - cron: '0 8 1 * *'

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  Python:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: new-workflows

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 
          cache: 'pip' # caching pip dependencies
      
      - name: Install python dependencies and GitHub CLI
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Run the main bibliography builder
        run: |
          python main.py
          # Check what happened in the output directory:
          ls -la out/