name: Miletus Bibliography Pipeline

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Refresh all bibliography files on this run"
        required: false
        default: false
        type: boolean
      latex:
        description: "Build PDFs on this run"
        required: false
        default: false
        type: boolean
      release:
        description: "Draft a release on this run"
        required: false
        default: false
        type: boolean
      issue:
        description: "Create the DataChecker issue on this run"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 8 1 * *"

jobs:
  get-bibliography:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Print run ID
        run: echo "Workflow-Run ID - ${{ github.run_id }}"

      - name: Determine mode
        id: mode
        shell: bash
        run: |
          REFRESH=false

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run: refreshing all bibliography files"
            REFRESH=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.refresh }}" = "true" ]; then
            echo "Manual dispatch with refresh enabled"
            REFRESH=true
          else
            echo "Cache-only mode"
          fi

          echo "refresh=$REFRESH" >> "$GITHUB_OUTPUT"

      - name: Restore cache
        id: restore-cache
        uses: actions/cache/restore@v6
        with:
          key: bibliography-${{ github.ref_name }}
          restore-keys: |
            bibliography-${{ github.ref_name }}-
          path: out/

      - name: Setup Python
        if: steps.mode.outputs.refresh == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3' 
          cache: 'pip' # caching pip dependencies

      - name: Install python dependencies
        if: steps.mode.outputs.refresh == 'true'
        run: |
          pip install -r requirements.txt

      - name: Refresh bibliography files
        if: steps.mode.outputs.refresh == 'true'
        run: python main.py
      
      - name: Refresh the HTML-table
        if: steps.mode.outputs.refresh == 'true'
        run: python bibliography_convert.py

      - name: Save cache of updated files
        if: always()
        uses: actions/cache/save@v6
        with:
          key: bibliography-${{ github.ref_name }}-${{ github.run_id }}
          path: out/

      - name: Show cached/refreshed files
        shell: bash
        run: |
          echo "Contents of out/:"
          ls -R out/

      - name: Upload Logs
        uses: actions/upload-artifact@v7
        with: 
          name: logs
          path: out/logs/
          retention-days: 31
          overwrite: true
      
      - name: Upload Data
        uses: actions/upload-artifact@v7
        with: 
          name: data
          path: out/data/
          retention-days: 31
          overwrite: true

      - name: Upload HTML Table
        uses: actions/upload-artifact@v7
        with: 
          name: html
          path: out/html/
          retention-days: 31
          overwrite: true

      - name: Upload TeX files
        uses: actions/upload-artifact@v7
        with: 
          name: tex
          path: out/tex/
          retention-days: 31
          overwrite: true

  build-pdfs:
    if: github.event_name != 'workflow_dispatch' || inputs.latex == true
    runs-on: ubuntu-latest
    needs: get-bibliography

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Data
        uses: actions/download-artifact@v7
        with:
          name: data
          path: out/data

      - name: Download TeX files
        uses: actions/download-artifact@v7
        with:
          name: tex
          path: out/tex

      - name: Show files
        run: |
          ls -R out/

      - name: Github Action for LaTeX
        uses: xu-cheng/latex-action@v3
        with: 
          compiler: latexmk
          texlive_version: 2023
          args: -pdf -auxdir=out/logs/ -outdir=../out/pdf/
          work_in_root_file_dir: true
          latexmk_use_xelatex: true
          root_file: |
            tex/milet-bibliographie-by-author-pdf.tex
            tex/milet-bibliographie-by-year-pdf.tex
            tex/milet-bibliographie-by-tag-pdf.tex
            tex/milet-bibliographie-summary.tex

      - name: Upload LaTeX logs
        uses: actions/upload-artifact@v7
        with:
          name: tex-logs
          path: tex/*.log

      - name: Upload PDFs
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: out/pdf/


  create-datachecker-issue:
    if: github.event_name != 'workflow_dispatch' || inputs.issue == true
    runs-on: ubuntu-latest
    needs: get-bibliography

    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Logs
        uses: actions/download-artifact@v7
        with:
          name: logs
          path: out/logs

      - name: make issue body
        run: RUN_ID=${{ github.run_id }} sh ./make_issue_body.sh

      - name: create issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="v$(date +'%-m-%Y')"
          echo $RELEASE_TAG
          gh issue create \
            --title "DataChecker Results for Miletus Bibliography: $RELEASE_TAG" \
            --body-file out/info/issue_body.md \
            --assignee lsteinmann


  draft-release:
    if: github.event_name != 'workflow_dispatch' || inputs.release == true
    runs-on: ubuntu-latest
    needs: build-pdfs
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Data
        uses: actions/download-artifact@v7
        with:
          name: data
          path: out/data

      - name: Download PDFs
        uses: actions/download-artifact@v7
        with:
          name: pdf
          path: out/pdf

      - name: Set bibliography version
        run: |
          echo "RELEASE_TAG=v$(date +'%-m-%Y')" >> "$GITHUB_ENV"

      - name: make release body
        run: RELEASE_TAG=${{ env.RELEASE_TAG }} sh ./make_release_body.sh
      
      - name: Draft Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.RELEASE_TAG }}
          tag: ${{ env.RELEASE_TAG }}
          artifacts: "out/data/**,out/pdf/**"
          draft: true
          makeLatest: true
          allowUpdates: true
          bodyFile: "out/info/release_body.md"